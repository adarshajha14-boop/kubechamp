apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/instance: kubechamp

---
apiVersion: argoproj.io/v1alpha1
kind: ArgoCD
metadata:
  name: kubechamp
  namespace: argocd
spec:
  # Server configuration
  server:
    autoscale:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
    
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Repo Server configuration
  repoServer:
    autoscale:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
    
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Application Controller
  controller:
    processors:
      operation: 10
      status: 20
    
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  # Notifications
  notifications:
    enabled: true

  # RBAC configuration
  rbac:
    defaultPolicy: 'role:viewer'
    policy: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, clusters, *, *, allow
      p, role:developer, applications, sync, */*, allow
      p, role:developer, applications, get, */*, allow
      p, role:viewer, applications, get, */*, allow
      p, role:viewer, repositories, get, *, allow
      
      g, admin-group, role:admin
      g, developers, role:developer
      g, viewers, role:viewer
    scopes: '[groups, cognito:groups, sub]'

  # Argo CD source repositories
  repositories:
    - url: https://github.com/kubechamp/services
      type: git
      name: kubechamp-services
      password: $github-token
      username: x-access-token
      insecure: false
      skipServerCertificateVerification: false
    
    - url: https://charts.kubechamp.io
      type: helm
      name: kubechamp-helm
    
    - url: https://github.com/kubechamp/platform-configs
      type: git
      name: kubechamp-configs

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubechamp-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/kubechamp/platform-configs
    targetRevision: main
    path: platform/overlays/prod
    
    # Using Helm for templating
    helm:
      releaseName: kubechamp-platform
      values: |
        environment: prod
        replicas: 3
  
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  
  # Sync policy
  syncPolicy:
    automated:
      prune: true          # Delete resources not in git
      selfHeal: true       # Auto-sync when cluster diverges
      allow:
        empty: false       # Prevent empty sync
    
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    
    # Manual approval for production
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubechamp-services
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/kubechamp/services
    targetRevision: main
    path: '.'
    
    # Multi-source support for better organization
    plugin:
      name: kustomize-with-helm
  
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  
  syncPolicy:
    automated:
      prune: false         # Manual prune for production safety
      selfHeal: false      # Manual sync for production
    
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true

---
apiVersion: v1
kind: Secret
metadata:
  name: github-credentials
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/kubechamp/services
  password: $GITHUB_TOKEN
  username: x-access-token

---
apiVersion: v1
kind: Secret
metadata:
  name: slack-notifications
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: notification
type: Opaque
stringData:
  slack-token: $SLACK_TOKEN

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notification-cm
  namespace: argocd
data:
  service.slack: |
    token: $slack-token
  
  template.app-deployed: |
    message: |
      Application {{.app.metadata.name}} deployment status is {{.app.status.operationState.phase}}.
  
  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.operationState.finishedAt
      send: [app-deployed]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: 'role:viewer'
  policy.csv: |
    # Admin users
    p, admin:*, applications, *, */*, allow
    p, admin:*, repositories, *, *, allow
    
    # Developer users
    p, developer:*, applications, get, */*, allow
    p, developer:*, applications, sync, */*, allow
    
    # Viewer users
    p, viewer:*, applications, get, */*, allow

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-network-policy
  namespace: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
