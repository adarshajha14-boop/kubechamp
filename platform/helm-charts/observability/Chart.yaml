apiVersion: v2
name: observability
description: KubeChamp Observability Stack (Prometheus, Grafana, ELK, Jaeger)
type: application
version: 1.0.0
appVersion: "1.0.0"

maintainers:
  - name: KubeChamp Team
    email: team@kubechamp.io

keywords:
  - observability
  - monitoring
  - logging
  - tracing

home: https://kubechamp.io
sources:
  - https://github.com/kubechamp/platform

dependencies:
  - name: kube-prometheus-stack
    version: "51.3.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.0.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
  - name: elasticsearch
    version: "8.5.1"
    repository: "https://helm.elastic.co"
    condition: elasticsearch.enabled
  - name: kibana
    version: "8.5.1"
    repository: "https://helm.elastic.co"
    condition: kibana.enabled
  - name: jaeger
    version: "0.71.0"
    repository: "https://jaegertracing.github.io/helm-charts"
    condition: jaeger.enabled
