apiVersion: v2
name: platform-core
description: KubeChamp Platform Core Services
type: application
version: 1.0.0
appVersion: "1.0.0"

maintainers:
  - name: KubeChamp Team
    email: team@kubechamp.io

keywords:
  - microservices
  - platform
  - kubernetes

home: https://kubechamp.io
sources:
  - https://github.com/kubechamp/platform

dependencies:
  - name: ingress-nginx
    version: "4.8.0"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingressNginx.enabled
  - name: kong
    version: "2.13.0"
    repository: "https://charts.konghq.com"
    condition: kong.enabled
