# KubeChamp Networking Stack Values

# Istio Service Mesh Configuration
istio:
  enabled: false  # Set to true if service mesh is desired
  
  # Istio Control Plane
  istiod:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1024Mi
  
  # Istio Ingress Gateway
  ingressGateway:
    enabled: true
    replicas: 2
    service:
      type: LoadBalancer
      ports:
        - port: 80
          protocol: TCP
          name: http2
        - port: 443
          protocol: TCP
          name: https
    
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  # Traffic Management
  trafficManagement:
    enabled: true
    
    # Default destination rules
    destinationRules:
      - name: default
        host: "*.default.svc.cluster.local"
        trafficPolicy:
          connectionPool:
            tcp:
              maxConnections: 1000
            http:
              http1MaxPendingRequests: 100
              maxRequestsPerConnection: 2
          loadBalancer:
            simple: LEAST_REQUEST
          outlierDetection:
            consecutive5xxErrors: 5
            interval: 30s
            baseEjectionTime: 30s

  # Security (mTLS)
  security:
    enabled: true
    mtls:
      mode: STRICT
    
    # Authorization policies
    authorizationPolicies: []

  # Virtual Services for routing
  virtualServices: []

  # Observability integration
  observability:
    traceSampling: 100
    accessLogging:
      enabled: true
      format: |
        [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%"
        %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT%
        "%DURATION%" "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
        "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%"
        "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%"
        "%UPSTREAM_HOST%"

# External DNS Configuration (auto-manage DNS for ingress)
externalDns:
  enabled: true
  
  provider: aws  # options: aws, azure, gcp, cloudflare
  registry: txt
  policy: sync
  
  # AWS Route53 configuration
  aws:
    region: us-east-1
    zoneType: public
    evaluateTargetHealth: true
  
  # DNS records to manage
  sources:
    - ingress
    - service
  
  # Services to expose as DNS
  serviceMonitor:
    enabled: true
    interval: 1m

# CoreDNS Configuration
coreDns:
  enabled: true
  replicas: 2
  
  config:
    # Custom DNS rules
    configBlock: |
      errors
      health :8080
      ready :8181
      kubernetes cluster.local in-addr.arpa ip6.arpa {
        pods insecure
        upstream
      }
      prometheus :9153
      cache 30 {
        denial 9830 prefetch 0.1~3.0~10.0 +success
      }
      loop
      reload
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Service Load Balancing
loadBalancing:
  enabled: true
  
  # Ingress NGINX (if not using Istio)
  ingress:
    enabled: true
    
    # Annotation for AWS NLB
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
  
  # Session affinity
  sessionAffinity:
    enabled: true
    type: ClientIP
    timeoutSeconds: 3600

# Network Policies
networkPolicies:
  enabled: true
  
  # Pod-to-Pod communication
  policies:
    - name: allow-ingress-to-frontend
      namespaceSelector:
        matchLabels:
          name: ingress-nginx
      podSelector:
        matchLabels:
          tier: frontend
    
    - name: allow-frontend-to-backend
      podSelector:
        matchLabels:
          tier: frontend
      ingress:
        - from:
            - podSelector:
                matchLabels:
                  tier: backend
      ports:
        - protocol: TCP
          port: 8080

# Egress Control
egressControl:
  enabled: false  # Enable for strict egress control
  
  # Default deny all egress
  denyAllEgress: false
  
  # Allow specific egress
  allowRules:
    - to:
      - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53  # DNS
        - protocol: UDP
          port: 53

# Multi-cluster Networking
multiCluster:
  enabled: false
  
  # Service export/import
  serviceExports: []
  
  # Cross-cluster communication
  crossClusterEndpoints: []

# DNS Policies
dnsPolicies:
  enabled: true
  
  # Pod DNS configuration
  dnsConfig:
    options:
      - name: ndots
        value: "2"
      - name: edns0

# Ingress Controllers
ingressControllers:
  - name: nginx
    enabled: true
    replicas: 2
    
  - name: aws-alb
    enabled: false
    
  - name: traefik
    enabled: false

# Load Balancer Configuration
loadBalancerConfig:
  algorithm: round-robin  # options: round-robin, least-connections, random
  stickySession:
    enabled: true
    ttl: 3600
  connectionDraining:
    enabled: true
    timeout: 300

# Health Checks
healthChecks:
  enabled: true
  
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Rate Limiting per Upstream
rateLimiting:
  enabled: true
  
  # Global rate limit
  global:
    requestsPerSecond: 5000
  
  # Per-service rate limits
  perService:
    requestsPerSecond: 1000

# Timeouts
timeouts:
  # Connection timeout
  connectionTimeout: 30s
  
  # Request timeout
  requestTimeout: 60s
  
  # Keep-alive timeout
  keepaliveTimeout: 65s
