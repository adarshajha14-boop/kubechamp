apiVersion: v2
name: security
description: KubeChamp Security Stack (Vault, RBAC, Network Policies)
type: application
version: 1.0.0
appVersion: "1.0.0"

maintainers:
  - name: KubeChamp Team
    email: team@kubechamp.io

keywords:
  - security
  - secrets
  - rbac
  - vault

home: https://kubechamp.io
sources:
  - https://github.com/kubechamp/platform

dependencies:
  - name: vault
    version: "0.27.0"
    repository: "https://helm.releases.hashicorp.com"
    condition: vault.enabled
  - name: sealed-secrets
    version: "2.13.2"
    repository: "https://sealed-secrets.github.io/helm-charts"
    condition: sealedSecrets.enabled
